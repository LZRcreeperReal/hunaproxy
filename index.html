<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google Drive</title>
  <link rel="icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" type="image/png"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">

  <!-- Ultraviolet scripts - these must load before your custom script -->
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>

  <style>
    :root {
      --bg: #0a0a0a;
      --text: #e0e0e0;
      --prompt: #00d4ff;
      --cursor: #00d4ff;
      --error: #ff4d4d;
      --glow: rgba(0, 212, 255, 0.15);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.15rem;
      line-height: 1.45;
    }
    body {
      padding: 1.2rem 2rem;
      display: flex;
      flex-direction: column;
    }
    .output {
      flex-grow: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      padding-bottom: 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: #333 #111;
    }
    .output::-webkit-scrollbar {
      width: 6px;
    }
    .output::-webkit-scrollbar-track {
      background: #111;
    }
    .output::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 3px;
    }
    .prompt-line {
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.6s ease-out;
      margin-top: 0.8rem;
      font-weight: 500;
    }
    .prompt-symbol {
      color: var(--prompt);
      margin-right: 0.6rem;
      text-shadow: 0 0 6px var(--glow);
      flex-shrink: 0;
    }
    #input {
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      outline: none;
      flex-grow: 1;
      caret-color: var(--cursor);
      text-shadow: 0 0 4px var(--glow);
    }
    #input::placeholder {
      color: #555;
      opacity: 0.6;
    }
    .blinking-cursor {
      display: inline-block;
      width: 9px;
      height: 1.3em;
      background: var(--cursor);
      box-shadow: 0 0 8px var(--cursor);
      animation: blink 1.1s step-end infinite;
      vertical-align: middle;
      margin-left: 4px;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    .ascii-art {
      white-space: pre;
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      line-height: 1.05;
      margin: 1.2rem 0;
      opacity: 0.92;
      color: #00d4ff;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.4s steps(4, end) infinite;
      color: var(--prompt);
    }
    @keyframes dots {
      0%, 25%  { content: '.'; }
      25%, 50% { content: '..'; }
      50%, 75% { content: '...'; }
      75%, 100%{ content: ''; }
    }
    .error {
      color: var(--error);
      text-shadow: 0 0 6px rgba(255, 77, 77, 0.5);
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
      z-index: 9999;
    }
    @media (max-width: 600px) {
      body { padding: 0.8rem 1.2rem; }
      .output { font-size: 1.05rem; }
      .ascii-art { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<div class="output" id="output"></div>

<div class="prompt-line" id="promptLine">
  <span class="prompt-symbol">HUNA-SYS v9.4  ></span>
  <input id="input" type="text" autocomplete="off" placeholder="destination or command..."/>
  <span class="blinking-cursor"></span>
</div>

<script>
// Elements
const output = document.getElementById('output');
const promptLine = document.getElementById('promptLine');
const input = document.getElementById('input');

// Print line
function print(text, className = '') {
  const line = document.createElement('div');
  line.textContent = text;
  if (className) line.className = className;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
}

// Typing effect
async function typeLine(text, delay = 25) {
  const line = document.createElement('div');
  output.appendChild(line);
  for (let char of text) {
    line.textContent += char;
    output.scrollTop = output.scrollHeight;
    await new Promise(r => setTimeout(r, delay));
  }
}

// Boot sequence ‚Äď futuristic style
async function bootSequence() {
  print('HUNA SYSTEM INTERFACE ‚Äď NEXT-GEN PROTOCOL v9.4');
  print('Copyright (c) 2025‚Äď2026 HUNA Labs. All rights reserved.');
  print('');
  await new Promise(r => setTimeout(r, 900));

  await typeLine('> Quantum core alignment..................... COMPLETE');
  await typeLine('> Neural pr0šĻāy tunnel initialization........ ESTABLISHED');
  await typeLine('> Guard bypass layer......................... ACTIVE');
  await typeLine('> Visual renderer sync....................... 60.0 TFLOPS');
  print('');

  const logo = `
‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó
‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ
‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ
‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĎ
‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ
  `;
  print(logo);

  await typeLine('HUNA pr0šĻāy core online (Ultraviolet powered). Awaiting input.', 20);
  print('Enter destination (e.g. youtube.com) or type "help"');
  print('');

  promptLine.style.opacity = '1';
  input.focus();
}

// Fake connecting animation
async function showLoading() {
  const loading = document.createElement('div');
  loading.textContent = 'Establishing secure tunnel';
  loading.className = 'loading-dots';
  output.appendChild(loading);
  output.scrollTop = output.scrollHeight;

  await new Promise(r => setTimeout(r, 1000 + Math.random() * 1200));
  loading.remove();
}

// Command handler
input.addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    const cmd = input.value.trim();
    if (!cmd) return;

    print(`> ${cmd}`);

    input.value = '';

    if (cmd.toLowerCase() === 'clear') {
      output.innerHTML = '';
      print('Display buffer cleared.');
    } else if (cmd.toLowerCase() === 'help') {
      print('Available commands:');
      print('  clear       ‚Äď reset screen');
      print('  help        ‚Äď show this message');
      print('  [url]       ‚Äď connect to destination');
      print('');
      print('Examples:');
      print('  google.com');
      print('  https://github.com');
    } else {
      await showLoading();

      let url = cmd.trim();
      if (!url.match(/^https?:\/\//i)) url = 'https://' + url;

      try {
        // Ultraviolet encoding (uses the codec from uv.config.js, usually xor)
        const encoded = __uv$config.encodeUrl(url);
        const proxySrc = __uv$config.prefix + encoded;

        const iframe = document.createElement('iframe');
        iframe.src = proxySrc;
        iframe.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation-by-user-activation allow-downloads';
        document.body.appendChild(iframe);

        // ESC to close overlay
        const escHandler = ev => {
          if (ev.key === 'Escape') {
            iframe.remove();
            document.removeEventListener('keydown', escHandler);
            input.focus();
            print(`> Connection terminated`);
          }
        };
        document.addEventListener('keydown', escHandler);

        print(`> Tunnel opened to ${url}  (ESC to return)`);
      } catch (err) {
        print(`> ERROR: Tunnel failed ‚Äď ${err.message}`, 'error');
        console.error('pr0šĻāy error:', err);
      }
    }
  }
});

// Focus input on click
document.addEventListener('click', () => input.focus());

// Start
bootSequence();

// Service Worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js', { scope: '/' })
    .then(reg => {
      console.log('Ultraviolet SW registered');
      print('> pr0šĻāy layer initialized');
    })
    .catch(err => {
      console.error('SW registration failed:', err);
      print('> Warning: pr0šĻāy layer failed to start ‚Äď check console', 'error');
    });
}
</script>

</body>
</html>
